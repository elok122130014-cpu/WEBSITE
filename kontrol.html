<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>VENTALUX | Kontrol Lampu</title>

    <link rel="stylesheet" href="css/dashboard.css">

    <link rel="stylesheet" href="css/kontrol.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="sidebar-header">

            <img src="img/logo.png">

            <h2>VENTALUX</h2>

            <p>Smart Monitoring System</p>

        </div>

        <nav>

            <a href="dashboard.html">

                <i class="fa-solid fa-house"></i>

                Dashboard

            </a>

            <a href="monitoring.html">

                <i class="fa-solid fa-chart-line"></i>

                Monitoring

            </a>

            <a href="kontrol.html" class="active">

                <i class="fa-solid fa-lightbulb"></i>

                Kontrol

            </a>

            <a href="historis.html">

                <i class="fa-solid fa-table"></i>

                Historis Data

            </a>

            <a href="login.html">

                <i class="fa-solid fa-right-from-bracket"></i>

                Logout

            </a>

        </nav>

    </aside>

    <!-- CONTENT -->

    <main class="content">

        <div class="topbar">

            <div>

                <h1>Kontrol Lampu</h1>

                <p>Mengontrol lampu melalui Internet secara realtime.</p>

            </div>

            <div class="online">

                🟢 Online

            </div>

        </div>

        <div class="control-card">

            <div class="lamp-icon">

                💡

            </div>

            <h2>Status Lampu</h2>

            <h1 id="lampStatus">

                MATI

            </h1>

            <div class="mode-card">

    <h3>Mode Operasi</h3>

    <label>

        <input
            type="radio"
            name="mode"
            id="manualMode"
            checked>

        Manual

    <label>

        <input
            type="radio"
            name="mode"
            id="autoMode">

        Otomatis

    </label>

    <!-- JADWAL OTOMATIS -->

    <div class="schedule-box" id="scheduleBox">

        <label>Jam Menyala</label>

        <input type="time" id="onTime" value="18:00">

        <label>Jam Mati</label>

        <input type="time" id="offTime" value="22:00">

        <button id="saveSchedule">

            Simpan Jadwal

        </button>

    </div>

</div>

            <div class="button-group">

                <button id="btnOn">

                    HIDUPKAN

                </button>

                <button id="btnOff">

                    MATIKAN

                </button>

            </div>

        </div>

        <div class="status-grid">

            <div class="status-card">

                <h4>ESP32</h4>

                <p class="online-text">

                    🟢 Connected

                </p>

            </div>

            <div class="status-card">

                <h4>Firebase</h4>

                <p class="online-text">

                    🟢 Connected

                </p>

            </div>

            <div class="status-card">

                <h4>Update Terakhir</h4>

                <p id="lastUpdate">

                    --

                </p>

            </div>

        </div>

    </main>

</div>

<script type="module" src="js/kontrol.js"></script>

</body>

</html>
